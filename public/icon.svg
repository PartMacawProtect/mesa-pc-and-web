<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#141829" />
    </linearGradient>
    <linearGradient id="mountain-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2a2552" />
      <stop offset="100%" stop-color="#4e3b8b" />
    </linearGradient>
    <linearGradient id="moon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a59bfb" />
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Base Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" stroke="#1c1f32" stroke-width="8" />
  
  <!-- Glowing Moon -->
  <circle cx="150" cy="150" r="42" fill="url(#moon-grad)" filter="url(#soft-glow)" opacity="0.9" />
  
  <!-- Serene Calm Mountain range -->
  <path d="M 64,420 
           C 160,350 200,280 250,280 
           C 300,280 340,360 448,420 
           Z" 
        fill="url(#mountain-grad)" 
        stroke="#4f46e5" 
        stroke-width="5" 
        stroke-linejoin="round" />
        
  <path d="M 160,420 
           C 220,380 250,330 280,330 
           C 315,330 350,390 410,420 
           Z" 
        fill="#312e81" 
        opacity="0.8" 
        stroke="#6366f1" 
        stroke-width="3" 
        stroke-linejoin="round" />
        
  <!-- Serene line stars -->
  <circle cx="380" cy="120" r="3" fill="#ffffff" opacity="0.6" />
  <circle cx="410" cy="180" r="2.5" fill="#ffffff" opacity="0.5" />
  <circle cx="300" cy="90" r="2" fill="#ffffff" opacity="0.4" />
  <circle cx="100" cy="280" r="3.5" fill="#ffffff" opacity="0.3" />
</svg>
