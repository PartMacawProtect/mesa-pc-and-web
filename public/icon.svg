<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#141829" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a59bfb" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Base Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" stroke="#1c1f32" stroke-width="8" />
  
  <!-- Glowing decorative lines -->
  <line x1="80" y1="180" x2="200" y2="180" stroke="#4e3b8b" stroke-width="2" opacity="0.5" />
  <line x1="312" y1="180" x2="432" y2="180" stroke="#4e3b8b" stroke-width="2" opacity="0.5" />
  
  <!-- Letter M - Minimalist style -->
  <text x="256" y="350" font-family="Arial, sans-serif" font-size="220" font-weight="700" 
        text-anchor="middle" fill="url(#text-grad)" filter="url(#soft-glow)">M</text>
  
  <!-- Small stars for accent -->
  <circle cx="120" cy="100" r="3" fill="#ffffff" opacity="0.4" />
  <circle cx="420" cy="120" r="2.5" fill="#ffffff" opacity="0.3" />
  <circle cx="400" cy="380" r="2" fill="#ffffff" opacity="0.3" />
</svg>
